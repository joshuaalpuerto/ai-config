version: "1"

# Event: Before a tool is executed
PreToolUse:
  # Rule: Inject Python coding standards when editing Python files
  - match:
      tools: ["Edit", "Write"]
      paths: ["*.py", "*.pyi"]
    action:
      inject: "./src/context/python-standards.md"

  # Rule: Inject REST API design guidelines for API routes
  - match:
      tools: ["Edit", "Write"]
      paths: ["**/src/api/**", "**/routes/**"]
    action:
      inject: "./src/context/api-design-guidelines.md"
  - match:
      tools: ["Write"]
      paths: ["*.go"]
    action:
      inject_inline: "You mush add `howdy go developer` on top of the file."

# Event: After a tool completes successfully
PostToolUse:
  # Rule: Run linting checks after file changes
  - match:
      tools: ["Write", "Edit"]
      paths: ["*.ts", "*.tsx", "*.js", "*.jsx"]
    action:
      run: "./scripts/lint-check.sh"
