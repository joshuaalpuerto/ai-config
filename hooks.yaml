version: "1"

# Event: Before a tool is executed
PreToolUse:
  # Rule: Inject Python coding standards when editing Python files
  - match:
      tools: ["Edit", "Write"]
      extensions: [".py", ".pyi"]
    action:
      inject: "context/python-standards.md"

  # Rule: Inject REST API design guidelines for API routes
  - match:
      tools: ["Edit", "Write"]
      directories: ["src/api/**", "routes/**"]
    action:
      inject: "context/api-design-guidelines.md"

# Event: After a tool completes successfully
PostToolUse:
  # Rule: Run linting checks after file changes
  - match:
      tools: ["Write", "Edit"]
      extensions: [".ts", ".tsx", ".js", ".jsx"]
    action:
      run: "./scripts/lint-check.sh"
